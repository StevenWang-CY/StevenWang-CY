<svg width="311" height="65" viewBox="0 0 311 65" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="website-title website-description">
  <title id="website-title">Website</title>
  <desc id="website-description">Open Chuyue Steven Wang's personal website</desc>
  <style>
    .background { fill: #FFFEFE; }
    .caption { fill: #464646; font: 600 11.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: .12px; }
    .portrait-ring { fill: none; stroke: #d0d7de; stroke-width: 1.25; }
    @media (prefers-color-scheme: dark) {
      .background { fill: #151515; }
      .caption { fill: #9E9E9E; }
      .portrait-ring { stroke: #484f58; }
    }
  </style>
  <defs>
    <clipPath id="portrait-clip">
      <circle cx="127.5" cy="32.5" r="15" />
    </clipPath>
  </defs>
  <rect class="background" width="311" height="65" />
  <image x="112.5" y="17.5" width="30" height="30" preserveAspectRatio="xMidYMid slice" clip-path="url(#portrait-clip)" href="data:image/jpeg;base64," />
  <circle class="portrait-ring" cx="127.5" cy="32.5" r="15" />
  <text class="caption" x="154.5" y="36.5">Website</text>
</svg>
