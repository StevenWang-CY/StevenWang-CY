name: generate animation

on:
  schedule:
    - cron: "17 0 * * *" # runs daily at 00:17 UTC
  workflow_dispatch:
  push:
    branches:
      - main

# A push and a scheduled/manual run must not race while updating main/output.
concurrency:
  group: profile-readme-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  generate-snake:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: generate light and dark contribution snakes
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Keep the reference layout exactly: grid bottom y=110, bar y=132
      # (22px gap), and 18px of canvas below the bar. GitHub adds its own
      # 16px paragraph margin, producing a 34px bar-to-card gap.
      - name: adjust and verify progress-bar geometry
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            sudo python3 - "$f" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()
          stack_rect = re.compile(r'<rect class="u [^"]+"[^>]*/>')
          old_box = 'viewBox="-16 -32 880 192" width="880" height="192"'
          new_box = 'viewBox="-16 -32 880 194" width="880" height="194"'

          segments = stack_rect.findall(text)
          if not segments:
              raise SystemExit(f"{path}: contribution progress bar is missing")
          if any(segment.count('y="144"') != 1 for segment in segments):
              raise SystemExit(f"{path}: a progress-bar segment has unexpected geometry")
          if text.count(old_box) != 1:
              raise SystemExit(f"{path}: expected exactly one 880x192 viewBox")

          updated = stack_rect.sub(
              lambda match: match.group(0).replace('y="144"', 'y="132"'),
              text,
          ).replace(old_box, new_box)
          moved_segments = stack_rect.findall(updated)
          if len(moved_segments) != len(segments):
              raise SystemExit(f"{path}: progress-bar segment count changed")
          if any(segment.count('y="132"') != 1 for segment in moved_segments):
              raise SystemExit(f"{path}: a moved progress-bar segment has unexpected geometry")
          if old_box in updated or updated.count(new_box) != 1:
              raise SystemExit(f"{path}: new geometry is not unique")

          path.write_text(updated)
          print(f"{path}: moved {len(segments)} progress-bar segments to y=132")
          PY
          done

      - name: stage snake artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contribution-snake
          path: dist/*.svg
          if-no-files-found: error
          retention-days: 1

  publish-snake:
    needs: generate-snake
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: download snake artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contribution-snake
          path: dist

      - name: validate snake artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/github-contribution-grid-snake.svg
          test -f dist/github-contribution-grid-snake-dark.svg
          test "$(find dist -type f | wc -l | tr -d ' ')" = "2"
          grep -Fq 'y="132"' dist/github-contribution-grid-snake.svg
          grep -Fq 'height="194"' dist/github-contribution-grid-snake.svg
          grep -Fq 'y="132"' dist/github-contribution-grid-snake-dark.svg
          grep -Fq 'height="194"' dist/github-contribution-grid-snake-dark.svg

      - name: publish snake to output branch
        uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
        with:
          target_branch: output
          build_dir: dist
          allow_empty_commit: false
          commit_message: "chore: refresh contribution snake"
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-featured-repos:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: check out main without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # Pin one UTC date for the entire job so a run crossing midnight cannot
      # generate one cache key and validate against the next day's date.
      - name: pin daily cache key
        shell: bash
        run: |
          set -euo pipefail
          printf 'PROFILE_CACHE_KEY=%s\n' "$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: install ImageMagick for posters and GIF flipbooks
        run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends imagemagick

      - name: regenerate featured repository cards
        run: node scripts/update-featured-repos.mjs "$PROFILE_OWNER"
        env:
          PROFILE_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: validate generated profile files
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/update-featured-repos.mjs
          git diff --check
          test -s README.md
          test -s assets/featured-0.svg
          test ! -e assets/featured-1.svg
          test -s assets/contribution-stats-light.svg
          test -s assets/contribution-stats-dark.svg
          test "$(find assets -maxdepth 1 -type f -name 'featured-*.svg' | wc -l | tr -d ' ')" = "1"
          test "$(find assets -maxdepth 1 -type f -name 'contribution-stats-*.svg' | wc -l | tr -d ' ')" = "2"
          test "$(sed -n '/FEATURED-REPOS:START/,/FEATURED-REPOS:END/p' README.md | grep -c '<a href=')" = "1"
          grep -Fq 'href="https://github.com/${{ github.repository_owner }}/AutoPaperLab"' README.md
          grep -Fq 'raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.repository_owner }}/main/assets/featured-0.svg' README.md
          grep -Fq '<svg width="846" height="212"' assets/featured-0.svg
          grep -Fq '>AutoPaperLab</text>' assets/featured-0.svg
          grep -Fq 'Hero source: docs/assets/paper_figure_architecture.png.' assets/featured-0.svg
          grep -Fq 'data:image/png;base64,' assets/featured-0.svg
          grep -Fq '<svg width="846" height="184"' assets/contribution-stats-light.svg
          grep -Fq '<svg width="846" height="184"' assets/contribution-stats-dark.svg
          grep -Fq '>Contribution rhythm</title>' assets/contribution-stats-light.svg
          grep -Fq '>Contribution rhythm</title>' assets/contribution-stats-dark.svg
          node <<'NODE'
          const fs = require("node:fs");
          const totals = ["light", "dark"].map((variant) => {
            const svg = fs.readFileSync(`assets/contribution-stats-${variant}.svg`, "utf8");
            const match = svg.match(/([\d,]+) total contributions/);
            if (!match) throw new Error(`${variant} contribution total is missing`);
            return Number(match[1].replaceAll(",", ""));
          });
          if (totals[0] < 2_000 || totals[0] !== totals[1]) {
            throw new Error(`invalid contribution totals: ${totals.join(", ")}`);
          }
          NODE
          grep -Fq 'assets/contribution-stats-light.svg' README.md
          grep -Fq 'assets/contribution-stats-dark.svg' README.md
          if grep -Fq 'streak-stats.demolab.com' README.md; then
            echo "README still depends on the live third-party streak service" >&2
            exit 1
          fi
          for icon in website linkedin email; do
            test -s "assets/contact-${icon}.svg"
          done
          stats_line="$(grep -n 'CONTRIBUTION-STATS:END' README.md | cut -d: -f1)"
          for icon in website linkedin email; do
            contact_line="$(grep -n "assets/contact-${icon}.svg" README.md | cut -d: -f1)"
            test "$contact_line" -gt "$stats_line"
          done
          test "$(tail -n 1 README.md)" = "</div>"
          test "$(grep -o "v=${PROFILE_CACHE_KEY}" README.md | wc -l | tr -d ' ')" = "7"
          if grep -RIE 'zxpeng2007/zxpeng2007/(output|main/assets)|user=zxpeng2007|Zixuan' README.md assets scripts; then
            echo "reference identity leaked into generated profile files" >&2
            exit 1
          fi
          if find assets -type f \( -name 'featured-*.svg' -o -name 'contribution-stats-*.svg' \) -size +8M -print -quit | grep -q .; then
            echo "generated profile image exceeds the 8 MiB safety limit" >&2
            exit 1
          fi
          git rev-parse HEAD > featured-base-sha.txt

      - name: stage featured-repository artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: featured-repositories
          path: |
            README.md
            assets/featured-*.svg
            assets/contribution-stats-*.svg
            featured-base-sha.txt
          if-no-files-found: error
          retention-days: 1

  publish-featured-repos:
    needs: generate-featured-repos
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: download featured-repository artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: featured-repositories
          path: generated

      - name: validate and install generated files
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat generated/featured-base-sha.txt)" = "$(git rev-parse HEAD)" || {
            echo "main changed while cards were rendering; a newer run will regenerate them" >&2
            exit 1
          }
          test -s generated/README.md
          test -s generated/assets/featured-0.svg
          test ! -e generated/assets/featured-1.svg
          test -s generated/assets/contribution-stats-light.svg
          test -s generated/assets/contribution-stats-dark.svg
          test "$(find generated/assets -maxdepth 1 -type f -name 'featured-*.svg' | wc -l | tr -d ' ')" = "1"
          test "$(find generated/assets -maxdepth 1 -type f -name 'contribution-stats-*.svg' | wc -l | tr -d ' ')" = "2"
          test "$(find generated -type f | wc -l | tr -d ' ')" = "5"
          if find generated -type l -print -quit | grep -q .; then
            echo "generated artifact contains a symbolic link" >&2
            exit 1
          fi
          if find generated/assets -type f \( -name 'featured-*.svg' -o -name 'contribution-stats-*.svg' \) -size +8M -print -quit | grep -q .; then
            echo "generated profile image exceeds the 8 MiB safety limit" >&2
            exit 1
          fi
          install -m 0644 generated/README.md README.md
          mkdir -p assets
          rm -f assets/featured-*.svg
          rm -f assets/contribution-stats-*.svg
          install -m 0644 generated/assets/featured-*.svg assets/
          install -m 0644 generated/assets/contribution-stats-*.svg assets/
          git diff --check

      - name: commit profile updates if changed
        shell: bash
        run: |
          set -euo pipefail
          git add README.md assets
          if ! git diff --staged --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh profile dashboard"
            git push origin HEAD:main
          else
            echo "featured repositories already up to date"
          fi
