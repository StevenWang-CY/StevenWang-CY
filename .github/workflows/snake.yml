name: generate animation

on:
  schedule:
    - cron: "17 0 * * *" # runs daily at 00:17 UTC
  workflow_dispatch:
  push:
    branches:
      - main

# A push and a scheduled/manual run must not race while updating main/output.
concurrency:
  group: profile-readme-${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  generate-snake:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      profile-cache-key: ${{ steps.cache-key.outputs.profile-cache-key }}
    steps:
      - name: check out counter postprocessor without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: capture generation date
        id: generation-date
        shell: bash
        run: |
          set -euo pipefail
          printf 'profile-date=%s\n' "$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: generate light and dark contribution snakes
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: pin generated date and detect UTC rollover
        id: cache-key
        shell: bash
        env:
          GENERATION_START_DATE: ${{ steps.generation-date.outputs.profile-date }}
        run: |
          set -euo pipefail
          profile_date="$(date -u +%Y%m%d)"
          rerun_snake=false
          if [[ "$profile_date" != "$GENERATION_START_DATE" ]]; then
            rerun_snake=true
          fi
          profile_cache_key="${profile_date}-r3"
          printf 'PROFILE_CACHE_KEY=%s\n' "$profile_cache_key" >> "$GITHUB_ENV"
          printf 'profile-cache-key=%s\n' "$profile_cache_key" >> "$GITHUB_OUTPUT"
          printf 'rerun-snake=%s\n' "$rerun_snake" >> "$GITHUB_OUTPUT"

      # If the first action straddled UTC midnight, replace its D graph with a
      # fresh D+1 graph before attaching the explicitly date-bounded counter.
      - name: regenerate snakes after UTC rollover
        if: steps.cache-key.outputs.rerun-snake == 'true'
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Keep the reference layout exactly (bar y=132), then add a clipped
      # counter whose step changes reuse each swallowed cell's own keyframe.
      - name: add synchronized public contribution counter
        shell: bash
        run: |
          set -euo pipefail
          test -d dist
          if find dist -type l -print -quit | grep -q .; then
            echo "generated snake directory contains a symbolic link" >&2
            exit 1
          fi
          # The pinned Docker action writes as root; narrow ownership repair to
          # its isolated artifact directory before atomic postprocessing.
          sudo chown -R "$(id -u):$(id -g)" dist
          node scripts/enhance-snake.mjs \
            "$PROFILE_OWNER" \
            "$PROFILE_CACHE_KEY" \
            dist/profile-contributions.json \
            dist/github-contribution-grid-snake.svg \
            dist/github-contribution-grid-snake-dark.svg
        env:
          PROFILE_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: stage snake artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contribution-snake
          path: dist/*.svg
          if-no-files-found: error
          retention-days: 1

      - name: stage shared public-contribution snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-contributions
          path: dist/profile-contributions.json
          if-no-files-found: error
          retention-days: 1

  publish-snake:
    needs: generate-snake
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: download snake artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contribution-snake
          path: dist

      - name: validate snake artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/github-contribution-grid-snake.svg
          test -f dist/github-contribution-grid-snake-dark.svg
          test "$(find dist -type f | wc -l | tr -d ' ')" = "2"
          python3 <<'PY'
          from pathlib import Path
          import re
          import xml.etree.ElementTree as ET

          allowed_tags = {
              "svg", "desc", "style", "rect", "defs", "clipPath", "g", "text",
          }
          expected_refs = {"#snake-counter-window"}
          signatures = []
          for variant in ("light", "dark"):
              path = Path(f"dist/github-contribution-grid-snake{'-dark' if variant == 'dark' else ''}.svg")
              raw = path.read_text(encoding="utf8")
              if len(raw.encode()) > 256 * 1024:
                  raise SystemExit(f"{path}: enhanced snake exceeds 256 KiB")
              if re.search(
                  r"<!DOCTYPE|<!ENTITY|<\s*(?:script|foreignObject|image|use|a|animate|set)\b|"
                  r"\s+on[a-z]+\s*=|(?:href|xlink:href)\s*=|@import|javascript:|data:",
                  raw,
                  re.IGNORECASE,
              ):
                  raise SystemExit(f"{path}: unsafe SVG content")
              root = ET.fromstring(raw)
              local = lambda tag: tag.rsplit("}", 1)[-1]
              if (
                  local(root.tag) != "svg"
                  or root.attrib.get("viewBox") != "-16 -32 880 194"
                  or root.attrib.get("width") != "880"
                  or root.attrib.get("height") != "194"
              ):
                  raise SystemExit(f"{path}: snake canvas geometry changed")
              tags = [local(element.tag) for element in root.iter()]
              if set(tags) - allowed_tags:
                  raise SystemExit(f"{path}: unexpected SVG tags {set(tags) - allowed_tags}")
              for element in root.iter():
                  for name, value in element.attrib.items():
                      attr = local(name).lower()
                      if attr.startswith("on") or attr == "href":
                          raise SystemExit(f"{path}: unsafe attribute {name}")
                      if re.search(r"javascript:|data:", value, re.IGNORECASE):
                          raise SystemExit(f"{path}: unsafe attribute value")
              refs = set(re.findall(r"url\(([^)]+)\)", raw))
              if refs != expected_refs:
                  raise SystemExit(f"{path}: unexpected URL references {refs}")

              counters = [
                  element for element in root.iter()
                  if element.attrib.get("id") == "snake-contribution-counter"
              ]
              if len(counters) != 1:
                  raise SystemExit(f"{path}: synchronized counter is missing or duplicated")
              counter = counters[0]
              try:
                  start = int(counter.attrib["data-start-total"])
                  final = int(counter.attrib["data-final-total"])
                  grid_total = int(counter.attrib["data-grid-total"])
                  event_count = int(counter.attrib["data-event-count"])
                  duration = int(counter.attrib["data-duration-ms"])
              except (KeyError, ValueError) as error:
                  raise SystemExit(f"{path}: invalid counter metadata") from error
              if (
                  start < 0 or final < 2_000 or grid_total < 1 or event_count < 1
                  or duration < 1_000 or duration > 120_000 or duration % 100
                  or start + grid_total != final
              ):
                  raise SystemExit(f"{path}: inconsistent counter metadata")

              values = [
                  element for element in counter.iter()
                  if local(element.tag) == "text"
                  and "snk-counter-value" in element.attrib.get("class", "").split()
              ]
              labels = [
                  element for element in counter.iter()
                  if local(element.tag) == "text"
                  and element.attrib.get("class") == "snk-counter-label"
              ]
              if len(values) != event_count + 1 or len(labels) != 1:
                  raise SystemExit(f"{path}: counter state structure changed")
              if "contributions" != "".join(labels[0].itertext()).strip():
                  raise SystemExit(f"{path}: counter uses an inaccurate label")

              state_signature = []
              previous_total = None
              previous_at = -1.0
              previous_step = -1
              deltas = []
              for index, value in enumerate(values):
                  try:
                      total = int(value.attrib["data-total"])
                      delta = int(value.attrib["data-delta"])
                      at_text = value.attrib["data-at"]
                      at = float(at_text)
                      step = int(value.attrib["data-step"])
                  except (KeyError, ValueError) as error:
                      raise SystemExit(f"{path}: malformed counter state") from error
                  date = value.attrib.get("data-date", "")
                  rendered = "".join(value.itertext()).strip().replace(",", "")
                  if rendered != str(total):
                      raise SystemExit(f"{path}: rendered counter total differs from metadata")
                  if index == 0:
                      if total != start or delta != 0 or date or at != 0 or step != 0:
                          raise SystemExit(f"{path}: invalid baseline counter state")
                  else:
                      if (
                          delta < 1 or total - previous_total != delta
                          or not re.fullmatch(r"\d{4}-\d{2}-\d{2}", date)
                          or at <= previous_at or at >= 100
                          or step <= previous_step
                      ):
                          raise SystemExit(f"{path}: invalid per-day counter increment")
                      deltas.append(delta)
                      expected_frame = (
                          f"{at_text}%{{transform:translateY(-{index * 18}px)}}"
                      )
                      if expected_frame not in raw:
                          raise SystemExit(f"{path}: counter timing diverges from state {index}")
                  state_signature.append((total, delta, date, at_text, step))
                  previous_total = total
                  previous_at = at
                  previous_step = step
              if previous_total != final or sum(deltas) != grid_total or not any(d > 1 for d in deltas):
                  raise SystemExit(f"{path}: cumulative counter arithmetic is incomplete")

              active_cells = [
                  element for element in root.iter()
                  if local(element.tag) == "rect"
                  and len(element.attrib.get("class", "").split()) == 2
                  and element.attrib.get("class", "").split()[0] == "c"
              ]
              stack_segments = [
                  element for element in root.iter()
                  if local(element.tag) == "rect"
                  and element.attrib.get("class", "").split()[:1] == ["u"]
              ]
              if len(active_cells) != event_count or not stack_segments:
                  raise SystemExit(f"{path}: counter no longer matches swallowed cells")
              if any(segment.attrib.get("y") != "132" for segment in stack_segments):
                  raise SystemExit(f"{path}: progress-bar geometry changed")
              required_css = (
                  "@keyframes snk-counter", f"snk-counter {duration}ms steps(1,end) infinite",
                  "@media (prefers-reduced-motion:reduce)",
                  f"100%{{transform:translateY(-{event_count * 18}px)}}",
              )
              if any(value not in raw for value in required_css):
                  raise SystemExit(f"{path}: counter animation/fallback is incomplete")
              if variant == "light" and not all(color in raw for color in ("#151515", "#464646")):
                  raise SystemExit(f"{path}: light counter palette changed")
              if variant == "dark" and not all(color in raw for color in ("#FEFEFE", "#9E9E9E")):
                  raise SystemExit(f"{path}: dark counter palette changed")
              signatures.append((start, final, grid_total, event_count, duration, state_signature))

          if signatures[0] != signatures[1]:
              raise SystemExit("light/dark synchronized counter schedules differ")
          PY

      - name: publish snake to output branch
        uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
        with:
          target_branch: output
          build_dir: dist
          allow_empty_commit: false
          commit_message: "chore: refresh contribution snake"
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-featured-repos:
    needs: generate-snake
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: check out main without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: download shared public-contribution snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: public-contributions
          path: generated-data

      - name: set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # Reuse generate-snake's key so even a run crossing UTC midnight keeps
      # the snapshot, snake URLs, and profile assets on one exact date.
      - name: reuse snake cache key
        shell: bash
        env:
          SHARED_PROFILE_CACHE_KEY: ${{ needs.generate-snake.outputs.profile-cache-key }}
        run: |
          set -euo pipefail
          [[ "$SHARED_PROFILE_CACHE_KEY" =~ ^[0-9]{8}-r3$ ]]
          printf 'PROFILE_CACHE_KEY=%s\n' "$SHARED_PROFILE_CACHE_KEY" >> "$GITHUB_ENV"

      - name: install ImageMagick for posters and GIF flipbooks
        run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends imagemagick

      - name: regenerate featured repository cards
        run: node scripts/update-featured-repos.mjs "$PROFILE_OWNER"
        env:
          PROFILE_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_CONTRIBUTIONS_SNAPSHOT: generated-data/profile-contributions.json

      - name: validate generated profile files
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/update-featured-repos.mjs
          node --check scripts/public-contributions.mjs
          node --check scripts/enhance-snake.mjs
          test -s generated-data/profile-contributions.json
          test ! -L generated-data/profile-contributions.json
          grep -Fq 'headers: publicContributionHeaders' scripts/public-contributions.mjs
          grep -Fq 'PUBLIC_CONTRIBUTIONS_SNAPSHOT' scripts/update-featured-repos.mjs
          if grep -R -Fq 'api.github.com/graphql' scripts; then
            echo "contribution metrics must come from GitHub's unauthenticated public calendar" >&2
            exit 1
          fi
          git diff --check
          test -s README.md
          test -s assets/featured-0.svg
          test ! -e assets/featured-1.svg
          test -s assets/contribution-stats-light.svg
          test -s assets/contribution-stats-dark.svg
          test "$(find assets -maxdepth 1 -type f -name 'featured-*.svg' | wc -l | tr -d ' ')" = "1"
          test "$(find assets -maxdepth 1 -type f -name 'contribution-stats-*.svg' | wc -l | tr -d ' ')" = "2"
          test "$(sed -n '/FEATURED-REPOS:START/,/FEATURED-REPOS:END/p' README.md | grep -c '<a href=')" = "1"
          grep -Fq 'href="https://github.com/${{ github.repository_owner }}/AutoPaperLab"' README.md
          grep -Fq 'raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.repository_owner }}/main/assets/featured-0.svg' README.md
          grep -Fq '<svg width="846" height="212"' assets/featured-0.svg
          grep -Fq '>AutoPaperLab</text>' assets/featured-0.svg
          grep -Fq 'Hero source: docs/assets/paper_figure_architecture.png.' assets/featured-0.svg
          grep -Fq 'data:image/png;base64,' assets/featured-0.svg
          python3 <<'PY'
          from pathlib import Path
          import json
          import re
          import xml.etree.ElementTree as ET

          allowed_tags = {
              "svg", "title", "desc", "view", "style", "defs", "clipPath", "rect",
              "mask", "ellipse", "g", "line", "text", "circle", "path",
          }
          expected_refs = {"#outer_rectangle", "#mask_out_ring_behind_fire"}
          results = []
          for variant in ("light", "dark"):
              path = Path(f"assets/contribution-stats-{variant}.svg")
              raw = path.read_text()
              if len(raw.encode()) > 64 * 1024:
                  raise SystemExit(f"{path}: compact streak card exceeds 64 KiB")
              if re.search(
                  r"<!DOCTYPE|<!ENTITY|<\s*(?:script|foreignObject|image|use|a|animate|set)\b|"
                  r"\s+on[a-z]+\s*=|(?:href|xlink:href)\s*=|@import|javascript:|data:",
                  raw,
                  re.IGNORECASE,
              ):
                  raise SystemExit(f"{path}: unsafe SVG content")
              root = ET.fromstring(raw)
              local = lambda tag: tag.rsplit("}", 1)[-1]
              if (
                  local(root.tag) != "svg"
                  or root.attrib.get("viewBox") != "0 0 495 195"
                  or root.attrib.get("width") != "495px"
                  or root.attrib.get("height") != "195px"
              ):
                  raise SystemExit(f"{path}: not Peng's compact 495x195 layout")
              tags = [local(element.tag) for element in root.iter()]
              if set(tags) - allowed_tags:
                  raise SystemExit(f"{path}: unexpected SVG tags {set(tags) - allowed_tags}")
              if tags.count("view") != 2 or tags.count("line") != 2 or tags.count("text") != 9:
                  raise SystemExit(f"{path}: compact card structure changed")
              views = {
                  element.attrib.get("id"): element.attrib.get("viewBox")
                  for element in root.iter()
                  if local(element.tag) == "view"
              }
              if views != {
                  "stats-summary": "0 0 330 195",
                  "stats-longest": "330 0 165 195",
              }:
                  raise SystemExit(f"{path}: clickable-layout views changed")
              for element in root.iter():
                  for name, value in element.attrib.items():
                      attr = local(name).lower()
                      if attr.startswith("on") or attr == "href":
                          raise SystemExit(f"{path}: unsafe attribute {name}")
                      if re.search(r"javascript:|data:", value, re.IGNORECASE):
                          raise SystemExit(f"{path}: unsafe attribute value")
              refs = set(re.findall(r"url\(([^)]+)\)", raw))
              if not refs.issubset(expected_refs):
                  raise SystemExit(f"{path}: unexpected URL references {refs}")
              required = (
                  "@keyframes currstreak", "@keyframes fadein",
                  "mask_out_ring_behind_fire", "cx='247.5' cy='71' r='40'",
                  "stroke='#FB8C00'", "Current Streak", "Longest Streak",
                  "Total Contributions", "1.4s both",
              )
              if any(value not in raw for value in required):
                  raise SystemExit(f"{path}: Peng-compatible animation/layout is incomplete")
              forbidden = ("Contribution rhythm", "Updated daily from GitHub", "LAST 28 DAYS")
              if any(value in raw for value in forbidden):
                  raise SystemExit(f"{path}: rejected custom dashboard design remains")
              if variant == "light" and not all(c in raw for c in ("#FFFEFE", "#151515", "#464646")):
                  raise SystemExit(f"{path}: light palette changed")
              if variant == "dark" and not all(c in raw for c in ("#151515", "#FEFEFE", "#9E9E9E")):
                  raise SystemExit(f"{path}: dark palette changed")
              texts = ["".join(element.itertext()).strip() for element in root.iter() if local(element.tag) == "text"]
              match = re.search(r"([\d,]+) total contributions", raw)
              if not match:
                  raise SystemExit(f"{path}: contribution total is missing")
              results.append((texts, int(match.group(1).replace(",", ""))))
          if results[0][0] != results[1][0]:
              raise SystemExit("light/dark streak metrics differ")
          snapshot = json.loads(Path("generated-data/profile-contributions.json").read_text())
          if (
              results[0][1] < 2_000
              or results[0][1] != results[1][1]
              or results[0][1] != snapshot.get("totalContributions")
          ):
              raise SystemExit(f"invalid contribution totals: {results[0][1]}, {results[1][1]}")
          PY
          grep -Fq 'assets/contribution-stats-light.svg' README.md
          grep -Fq 'assets/contribution-stats-dark.svg' README.md
          grep -Fq 'animated as a snake with a synchronized contribution counter' README.md
          # These literal smart quotes are part of the profile name.
          # shellcheck disable=SC1112
          grep -Fq 'alt="Chuyue “Steven” Wang’s total contributions and current GitHub streak"' README.md
          # shellcheck disable=SC1112
          grep -Fq 'alt="Chuyue “Steven” Wang’s longest GitHub streak"' README.md
          stats_block="$(sed -n '/CONTRIBUTION-STATS:START/,/CONTRIBUTION-STATS:END/p' README.md)"
          if ! grep -Fq 'align="left"' <<<"$stats_block" \
            || ! grep -Fq 'width="330" height="195"' <<<"$stats_block" \
            || ! grep -Fq 'align="right"' <<<"$stats_block" \
            || ! grep -Fq 'width="165" height="195"' <<<"$stats_block" \
            || ! grep -Fq '<br clear="all">' <<<"$stats_block"; then
            echo "split Peng streak composition is incomplete" >&2
            exit 1
          fi
          if grep -Fq 'streak-stats.demolab.com' README.md; then
            echo "README still depends on the live third-party streak service" >&2
            exit 1
          fi
          for icon in website linkedin email; do
            test -s "assets/contact-${icon}.svg"
            test ! -L "assets/contact-${icon}.svg"
          done
          python - <<'PY'
          import base64
          import hashlib
          import re
          from pathlib import Path
          from xml.etree import ElementTree as ET

          namespace = "{http://www.w3.org/2000/svg}"
          names = ("website", "linkedin", "email")
          labels = {"website": "Website", "linkedin": "LinkedIn", "email": "Email"}
          forbidden_tags = {"animate", "animateMotion", "animateTransform", "foreignObject", "script", "set", "use"}

          def local(value):
              return value.rsplit("}", 1)[-1]

          for name in names:
              path = Path(f"assets/contact-{name}.svg")
              raw_bytes = path.read_bytes()
              if len(raw_bytes) > 16 * 1024:
                  raise SystemExit(f"{path}: contact asset exceeds 16 KiB")
              raw = raw_bytes.decode("utf-8")
              lowered = raw.lower()
              if "<!doctype" in lowered or "<!entity" in lowered:
                  raise SystemExit(f"{path}: document types and entities are forbidden")
              root = ET.fromstring(raw)
              if (
                  root.tag != f"{namespace}svg"
                  or root.get("width") != "311"
                  or root.get("height") != "65"
                  or root.get("viewBox") != "0 0 311 65"
                  or root.get("role") != "img"
              ):
                  raise SystemExit(f"{path}: contact geometry or accessibility metadata changed")

              title = root.find(f"{namespace}title")
              description = root.find(f"{namespace}desc")
              if (
                  title is None
                  or title.text != labels[name]
                  or description is None
                  or not "Chuyue Steven Wang" in (description.text or "")
              ):
                  raise SystemExit(f"{path}: title or description changed")

              elements = list(root.iter())
              tags = {local(element.tag) for element in elements}
              if tags & forbidden_tags:
                  raise SystemExit(f"{path}: active or externally reusable SVG content is forbidden")
              backgrounds = [element for element in elements if local(element.tag) == "rect"]
              if (
                  len(backgrounds) != 1
                  or backgrounds[0].get("class") != "background"
                  or backgrounds[0].get("width") != "311"
                  or backgrounds[0].get("height") != "65"
                  or any(attribute in backgrounds[0].attrib for attribute in ("rx", "ry", "stroke"))
                  or "ellipse" in tags
              ):
                  raise SystemExit(f"{path}: flat rail background changed or a pill returned")
              captions = ["".join(element.itertext()).strip() for element in elements if local(element.tag) == "text"]
              if captions != [labels[name]]:
                  raise SystemExit(f"{path}: visible caption changed")
              if not all(color in raw for color in ("#FFFEFE", "#151515", "#464646", "#9E9E9E")):
                  raise SystemExit(f"{path}: Peng-compatible rail palette changed")

              images = []
              for element in elements:
                  for attribute, value in element.attrib.items():
                      attribute_name = local(attribute)
                      if attribute_name.lower().startswith("on"):
                          raise SystemExit(f"{path}: event attributes are forbidden")
                      if attribute_name == "href":
                          if local(element.tag) != "image" or not value.startswith("data:image/jpeg;base64,"):
                              raise SystemExit(f"{path}: external SVG references are forbidden")
                          images.append(value)

              if name == "website":
                  if len(images) != 1 or "portrait-clip" not in raw:
                      raise SystemExit(f"{path}: embedded clipped profile portrait is missing")
                  portrait = base64.b64decode(images[0].split(",", 1)[1], validate=True)
                  if (
                      len(portrait) > 4 * 1024
                      or not portrait.startswith(b"\xff\xd8")
                      or not portrait.endswith(b"\xff\xd9")
                      or hashlib.sha256(portrait).hexdigest() != "5fd68a48d5e61a8525330a94cd2256375e48df34726a8a7acd2f48cdbf10378d"
                  ):
                      raise SystemExit(f"{path}: embedded profile portrait changed")
              elif images:
                  raise SystemExit(f"{path}: unexpected embedded image")

              if name == "linkedin" and ("#0A66C2" not in raw or "M1.91 0h22.363" not in raw):
                  raise SystemExit(f"{path}: official LinkedIn mark changed")
              if name == "email" and not all(token in raw for token in ("#fc413d", "gmail-side", "gmail-chevron")):
                  raise SystemExit(f"{path}: official Gmail artwork changed")

          readme = Path("README.md").read_text()
          expected_links = (
              ('https://chuyuewang.vercel.app/', 'Visit my website', 'Website', 'website'),
              ('https://www.linkedin.com/in/chuyue-wang/', 'Connect on LinkedIn', 'LinkedIn', 'linkedin'),
              ('mailto:stevenwang0805@outlook.com', 'Send me an email', 'Email', 'email'),
          )
          positions = []
          rail_rows = []
          for destination, title, label, name in expected_links:
              snippet = (
                  f'<a href="{destination}" title="{title}"><img align="top" alt="{label}" '
                  f'src="https://raw.githubusercontent.com/StevenWang-CY/StevenWang-CY/main/assets/contact-{name}.svg?v=contact-stats-rail-r2" '
                  'width="311" height="65" /></a>'
              )
              if readme.count(snippet) != 1:
                  raise SystemExit(f"README: exact {name} contact link is missing or duplicated")
              positions.append(readme.index(snippet))
              rail_rows.append(snippet)
          stats_start = readme.index("<!-- CONTRIBUTION-STATS:START -->")
          stats_end = readme.index("<!-- CONTRIBUTION-STATS:END -->")
          expected_rail = (
              f"{rail_rows[0]}<br>\n"
              f"{rail_rows[1]}<br>\n"
              f'{rail_rows[2]}<br clear="all">'
          )
          if (
              positions != sorted(positions)
              or positions[0] <= stats_start
              or positions[-1] >= stats_end
              or readme.count(expected_rail) != 1
              or readme.count("#stats-summary") != 3
              or readme.count("#stats-longest") != 3
              or "contact-borderless-r1" in readme
              or "contact-stats-rail-r1" in readme
          ):
              raise SystemExit("README: vertical contact rail or streak views changed")
          if len(re.findall(r"assets/contact-(?:website|linkedin|email)\.svg", readme)) != 3:
              raise SystemExit("README: unexpected contact asset reference")
          outside_stats = readme[:stats_start] + readme[stats_end + len("<!-- CONTRIBUTION-STATS:END -->"):]
          if re.search(r"assets/contact-(?:website|linkedin|email)\.svg", outside_stats):
              raise SystemExit("README: legacy contact footer returned")
          PY
          test "$(tail -n 1 README.md)" = "<!-- CONTRIBUTION-STATS:END -->"
          test "$(grep -o "v=${PROFILE_CACHE_KEY}" README.md | wc -l | tr -d ' ')" = "10"
          if grep -RIE 'zxpeng2007/zxpeng2007/(output|main/assets)|user=zxpeng2007|Zixuan' README.md assets scripts; then
            echo "reference identity leaked into generated profile files" >&2
            exit 1
          fi
          if find assets -type f \( -name 'featured-*.svg' -o -name 'contribution-stats-*.svg' \) -size +8M -print -quit | grep -q .; then
            echo "generated profile image exceeds the 8 MiB safety limit" >&2
            exit 1
          fi
          git rev-parse HEAD > featured-base-sha.txt

      - name: stage featured-repository artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: featured-repositories
          path: |
            README.md
            assets/featured-*.svg
            assets/contribution-stats-*.svg
            featured-base-sha.txt
          if-no-files-found: error
          retention-days: 1

  publish-featured-repos:
    needs:
      - generate-featured-repos
      - publish-snake
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: download featured-repository artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: featured-repositories
          path: generated

      - name: validate and install generated files
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat generated/featured-base-sha.txt)" = "$(git rev-parse HEAD)" || {
            echo "main changed while cards were rendering; a newer run will regenerate them" >&2
            exit 1
          }
          test -s generated/README.md
          test -s generated/assets/featured-0.svg
          test ! -e generated/assets/featured-1.svg
          test -s generated/assets/contribution-stats-light.svg
          test -s generated/assets/contribution-stats-dark.svg
          test "$(find generated/assets -maxdepth 1 -type f -name 'featured-*.svg' | wc -l | tr -d ' ')" = "1"
          test "$(find generated/assets -maxdepth 1 -type f -name 'contribution-stats-*.svg' | wc -l | tr -d ' ')" = "2"
          test "$(find generated -type f | wc -l | tr -d ' ')" = "5"
          if find generated -type l -print -quit | grep -q .; then
            echo "generated artifact contains a symbolic link" >&2
            exit 1
          fi
          if find generated/assets -type f \( -name 'featured-*.svg' -o -name 'contribution-stats-*.svg' \) -size +8M -print -quit | grep -q .; then
            echo "generated profile image exceeds the 8 MiB safety limit" >&2
            exit 1
          fi
          install -m 0644 generated/README.md README.md
          mkdir -p assets
          rm -f assets/featured-*.svg
          rm -f assets/contribution-stats-*.svg
          install -m 0644 generated/assets/featured-*.svg assets/
          install -m 0644 generated/assets/contribution-stats-*.svg assets/
          git diff --check

      - name: commit profile updates if changed
        shell: bash
        run: |
          set -euo pipefail
          git add README.md assets
          if ! git diff --staged --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh profile dashboard"
            git push origin HEAD:main
          else
            echo "featured repositories already up to date"
          fi
